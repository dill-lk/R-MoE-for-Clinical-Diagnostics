name: Build R-MoE Binaries

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Unix)
        if: runner.os != 'Windows'
        run: cmake --build build --config Release -j 4

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release

      - name: Package binary (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp build/rmoe_engine dist/rmoe_engine-linux

      - name: Package binary (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp build/rmoe_engine dist/rmoe_engine-macos

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if (Test-Path "build/Release/rmoe_engine.exe") {
            Copy-Item "build/Release/rmoe_engine.exe" "dist/rmoe_engine-windows.exe"
          } elseif (Test-Path "build/rmoe_engine.exe") {
            Copy-Item "build/rmoe_engine.exe" "dist/rmoe_engine-windows.exe"
          } else {
            throw "rmoe_engine.exe not found"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rmoe_engine-${{ runner.os }}
          path: dist/*
          if-no-files-found: error
