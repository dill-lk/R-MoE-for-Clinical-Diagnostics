name: Build and Release R-MoE (Legacy C++ Engine)

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure & Build (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S legacy -B legacy/build -DCMAKE_BUILD_TYPE=Release
          cmake --build legacy/build --config Release -j 4
          mkdir -p dist
          cp legacy/build/rmoe_engine dist/rmoe_engine-linux

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S legacy -B legacy/build -DCMAKE_BUILD_TYPE=Release
          cmake --build legacy/build --config Release
          New-Item -ItemType Directory -Force -Path dist
          if (Test-Path "legacy/build/Release/rmoe_engine.exe") {
            Copy-Item "legacy/build/Release/rmoe_engine.exe" "dist/rmoe_engine-windows.exe"
          } else {
            Copy-Item "legacy/build/rmoe_engine.exe" "dist/rmoe_engine-windows.exe"
          }

      - name: Auto-Release by GitHub Bot
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          name: R-MoE Version ${{ github.ref_name }}
          body: |
            ### 🩺 R-MoE Diagnostic Engine (v0.1)
            Automated Build by GitHub Actions Bot.

            **Primary engine:** Python (`engine.py`) — run with `python engine.py --image patient.png`
            **Legacy C++ engine:** included as pre-built binaries below.

            **Included Binaries:**
            - Linux (Ubuntu)
            - Windows (x64)

            **Commit:** ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
