name: R-MoE Python Engine — CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint-and-syntax:
    name: Python lint & syntax check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install pyflakes

      - name: Syntax check engine.py
        run: python -m py_compile engine.py && echo "✅ engine.py syntax OK"

      - name: Syntax check colab_runner.py
        run: python -m py_compile colab_runner.py && echo "✅ colab_runner.py syntax OK"

      - name: Pyflakes engine.py
        run: python -m pyflakes engine.py

      - name: Pyflakes colab_runner.py
        run: python -m pyflakes colab_runner.py

      - name: Verify mock pipeline (no models needed)
        run: |
          python engine.py --image test_patient.png 2>&1 | head -60
        continue-on-error: true   # models not available in CI; syntax/import errors still fail
