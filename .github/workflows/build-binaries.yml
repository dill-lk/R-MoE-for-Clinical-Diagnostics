name: Build and Release R-MoE

on:
  push:
    branches:
      - "**"
    tags:
      - "v*" # උදා: v0.91, v1.0.0 වගේ tag එකක් push කරපු ගමන් වැඩේ පටන් ගන්නවා

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # Bot එකට Release එකක් හදන්න අවසර දෙනවා
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure & Build (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j 4
          mkdir -p dist
          cp build/rmoe_engine dist/rmoe_engine-linux

      - name: Configure & Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          New-Item -ItemType Directory -Force -Path dist
          # Build artifacts කොහේ තිබුණත් dist එකට ගන්නවා
          if (Test-Path "build/Release/rmoe_engine.exe") {
            Copy-Item "build/Release/rmoe_engine.exe" "dist/rmoe_engine-windows.exe"
          } else {
            Copy-Item "build/rmoe_engine.exe" "dist/rmoe_engine-windows.exe"
          }

      - name: Auto-Release by GitHub Bot
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          name: R-MoE Version ${{ github.ref_name }}
          body: |
            ### 🩺 R-MoE Diagnostic Engine (v0.1)
            Automated Build by GitHub Actions Bot.
            
            **Included Binaries:**
            - Linux (Ubuntu)
            - Windows (x64)
            
            **Commit:** ${{ github.sha }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # මෙන්න Bot එක පාවිච්චි කරන Token එක
